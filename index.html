<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>英単語 Anki</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --bg: #f1f5f9;
  --card-bg: #ffffff;
  --text: #1e293b;
  --sub: #64748b;
  --border: #e2e8f0;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --nav-h: 60px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== Header ===== */
header {
  background: var(--primary);
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 100;
}
header h1 { font-size: 1.1rem; font-weight: 700; }
.header-stats { font-size: 0.75rem; opacity: 0.9; text-align: right; line-height: 1.5; }

/* ===== Deck selector bar ===== */
.deck-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
.deck-bar::-webkit-scrollbar { display: none; }
.deck-chip {
  flex: none;
  padding: 6px 14px;
  border-radius: 99px;
  border: 2px solid var(--border);
  background: white;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  min-height: 34px;
  transition: all 0.15s;
}
.deck-chip.active { border-color: var(--primary); background: var(--primary); color: white; }

/* ===== Pages ===== */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.page {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}
.page.active { display: block; }
.page-inner { max-width: 600px; margin: 0 auto; padding-bottom: 12px; }

/* ===== Bottom Nav ===== */
.bottom-nav {
  display: flex;
  background: white;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  min-height: var(--nav-h);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--sub);
  background: none;
  border: none;
  cursor: pointer;
  gap: 3px;
  transition: color 0.15s;
}
.nav-btn .nav-icon { font-size: 1.4rem; line-height: 1; }
.nav-btn.active { color: var(--primary); }

/* ===== Study Page ===== */
.study-modes {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.mode-btn {
  flex: 1;
  min-width: 0;
  padding: 10px 6px;
  font-size: 0.78rem;
  font-weight: 600;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: white;
  color: var(--sub);
  cursor: pointer;
  text-align: center;
  min-height: 44px;
  transition: all 0.2s;
}
.mode-btn.active { border-color: var(--primary); background: var(--primary); color: white; }

.progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 10px; }
.progress-bar { height: 6px; background: var(--primary); border-radius: 99px; transition: width 0.4s; }
.progress-label { text-align: center; font-size: 0.8rem; color: var(--sub); margin-bottom: 12px; }

.card-scene { width: 100%; perspective: 1000px; margin-bottom: 16px; cursor: pointer; touch-action: pan-y; }
.flip-card {
  width: 100%;
  min-height: 220px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.flip-card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  width: 100%;
  min-height: 220px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 18px;
  background: var(--card-bg);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 24px;
  text-align: center;
}
.card-back { transform: rotateY(180deg); }
.card-tag { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sub); margin-bottom: 10px; }
.card-word { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1.2; }
.card-phonetic { font-size: 0.95rem; color: var(--sub); margin-top: 6px; font-style: italic; }
.card-category-badge { margin-top: 10px; padding: 3px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; background: #ede9fe; color: var(--primary); }
.card-deck-badge { margin-top: 6px; padding: 2px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; color: white; }
.card-hint { font-size: 0.78rem; color: var(--sub); margin-top: 14px; opacity: 0.7; }
.card-meaning { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.card-example { font-size: 0.9rem; color: var(--sub); font-style: italic; line-height: 1.6; }
.card-example-ja { font-size: 0.85rem; color: var(--sub); margin-top: 4px; line-height: 1.5; }
.card-notes { font-size: 0.82rem; color: #94a3b8; margin-top: 8px; }

.flip-hint { text-align: center; font-size: 0.78rem; color: var(--sub); margin-bottom: 12px; }

.rating-section { margin-top: 4px; }
.rating-label { text-align: center; font-size: 0.82rem; color: var(--sub); margin-bottom: 10px; }
.rating-btns { display: flex; gap: 6px; }
.rate-btn {
  flex: 1;
  padding: 12px 4px;
  border: none;
  border-radius: 12px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-height: 52px;
}
.rate-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.rate-btn span.emoji { font-size: 1.2rem; }
.rate-btn.r1 { background: #fee2e2; color: #b91c1c; }
.rate-btn.r2 { background: #ffedd5; color: #c2410c; }
.rate-btn.r3 { background: #fef3c7; color: #b45309; }
.rate-btn.r4 { background: #d1fae5; color: #065f46; }
.rate-btn.r5 { background: #dbeafe; color: #1e40af; }
.rate-btn:not(:disabled):active { transform: scale(0.93); }

.no-cards-msg { text-align: center; padding: 48px 20px; color: var(--sub); }
.no-cards-msg .big { font-size: 3rem; margin-bottom: 12px; }
.no-cards-msg p { font-size: 1rem; margin-bottom: 16px; }

.summary-card { background: white; border-radius: 18px; padding: 28px 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.summary-card h2 { font-size: 1.3rem; margin-bottom: 6px; }
.summary-card .big-num { font-size: 3rem; font-weight: 900; color: var(--primary); }
.summary-dist { display: flex; gap: 6px; margin: 16px 0; }
.summary-dist div { flex: 1; padding: 10px 4px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; text-align: center; }
.summary-dist .d1 { background: #fee2e2; color: #b91c1c; }
.summary-dist .d2 { background: #ffedd5; color: #c2410c; }
.summary-dist .d3 { background: #fef3c7; color: #b45309; }
.summary-dist .d4 { background: #d1fae5; color: #065f46; }
.summary-dist .d5 { background: #dbeafe; color: #1e40af; }
.summary-dist .d-num { font-size: 1.3rem; display: block; }
.btn-primary {
  display: inline-block;
  padding: 14px 32px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  min-height: 48px;
  transition: all 0.15s;
}
.btn-primary:active { transform: scale(0.97); }

/* ===== Folder Page ===== */
.folder-list { display: flex; flex-direction: column; gap: 10px; }
.deck-card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  cursor: pointer;
  transition: all 0.15s;
  min-height: 72px;
}
.deck-card:active { transform: scale(0.99); box-shadow: none; }
.deck-color-dot { width: 14px; height: 44px; border-radius: 6px; flex-shrink: 0; }
.deck-info { flex: 1; min-width: 0; }
.deck-name { font-weight: 700; font-size: 1rem; }
.deck-meta { font-size: 0.8rem; color: var(--sub); margin-top: 3px; }
.deck-due-badge {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 99px;
  background: #fee2e2;
  color: #b91c1c;
}
.deck-menu-btn {
  background: none;
  border: none;
  font-size: 1.2rem;
  color: var(--sub);
  cursor: pointer;
  padding: 8px;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.deck-menu-btn:active { background: var(--bg); }

.all-deck-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(79,70,229,0.3);
  min-height: 64px;
  transition: all 0.15s;
}
.all-deck-card:active { transform: scale(0.99); }
.all-deck-card .deck-name { color: white; font-size: 1.1rem; }
.all-deck-card .deck-meta { color: rgba(255,255,255,0.8); }

/* ===== List Page ===== */
.search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
.search-bar input {
  flex: 1;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  background: white;
  min-height: 48px;
}
.search-bar input:focus { border-color: var(--primary); }
.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  flex: none;
  padding: 6px 14px;
  border-radius: 99px;
  border: 2px solid var(--border);
  background: white;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  min-height: 36px;
  transition: all 0.15s;
}
.filter-chip.active { border-color: var(--primary); background: var(--primary); color: white; }

.word-list { display: flex; flex-direction: column; gap: 8px; }
.word-item {
  background: white;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.15s;
  min-height: 60px;
}
.word-item:active { transform: scale(0.99); box-shadow: none; }
.word-item-level { width: 32px; height: 32px; border-radius: 50%; font-size: 0.85rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.lv0 { background: #f1f5f9; color: #94a3b8; }
.lv1 { background: #fee2e2; color: #b91c1c; }
.lv2 { background: #ffedd5; color: #c2410c; }
.lv3 { background: #fef3c7; color: #b45309; }
.lv4 { background: #d1fae5; color: #065f46; }
.lv5 { background: #dbeafe; color: #1e40af; }
.word-item-body { flex: 1; min-width: 0; }
.word-item-en { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.word-item-ja { font-size: 0.82rem; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.word-item-meta { font-size: 0.72rem; color: #94a3b8; margin-top: 2px; }
.word-item-badges { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; flex-shrink: 0; }
.word-item-cat { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: #ede9fe; color: var(--primary); }
.word-item-deck { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; color: white; }

/* ===== Stats Page ===== */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: white; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.stat-card .num { font-size: 2rem; font-weight: 900; color: var(--primary); }
.stat-card .label { font-size: 0.78rem; color: var(--sub); margin-top: 4px; }
.level-bars { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 10px; }
.level-bars h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
.level-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.level-bar-row .lv-label { width: 40px; font-size: 0.82rem; font-weight: 700; }
.level-bar-track { flex: 1; background: var(--bg); border-radius: 99px; height: 14px; overflow: hidden; }
.level-bar-fill { height: 14px; border-radius: 99px; transition: width 0.6s; }
.level-bar-row .lv-count { width: 30px; text-align: right; font-size: 0.82rem; color: var(--sub); }
.cat-list { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.cat-list h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
.cat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
.cat-row:last-child { border-bottom: none; }
.cat-name { font-weight: 600; }
.cat-count { color: var(--sub); font-size: 0.82rem; }

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  right: 20px;
  width: 56px;
  height: 56px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 1.6rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: all 0.15s;
}
.fab:active { transform: scale(0.93); }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 22px 22px 0 0;
  padding: 20px 16px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }

/* Deck color picker */
.color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
.color-swatch {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
}
.color-swatch.selected { border-color: var(--text); transform: scale(1.15); }

/* Form styles */
.form-card { background: white; border-radius: 18px; padding: 0; margin-bottom: 12px; }
.form-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  background: #f8fafc;
  color: var(--text);
  transition: border-color 0.15s;
  -webkit-appearance: none;
  min-height: 48px;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); background: white; }
.form-group textarea { resize: vertical; min-height: 80px; font-size: 15px; }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.btn-row { display: flex; gap: 8px; }
.btn-save {
  flex: 1; padding: 15px; background: var(--primary); color: white;
  border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
  cursor: pointer; min-height: 50px; transition: all 0.15s;
}
.btn-save:active { transform: scale(0.97); }
.btn-cancel {
  padding: 15px 20px; background: var(--bg); color: var(--sub);
  border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
  cursor: pointer; min-height: 50px;
}
.btn-delete {
  width: 100%; padding: 14px; background: #fee2e2; color: var(--red);
  border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; margin-top: 8px; min-height: 48px;
}

/* Context menu */
.ctx-menu {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  min-width: 180px;
}
.ctx-item {
  display: block; width: 100%; padding: 14px 18px;
  text-align: left; border: none; background: none;
  font-size: 0.95rem; cursor: pointer; color: var(--text);
  min-height: 48px;
}
.ctx-item:active { background: var(--bg); }
.ctx-item.danger { color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); }

.empty-list { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 0.9rem; }

@media (min-width: 600px) {
  .page { padding: 20px; }
  .flip-card { min-height: 260px; }
  .card-face { min-height: 260px; }
  .card-word { font-size: 2.4rem; }
  .modal-overlay { align-items: center; }
  .modal { border-radius: 22px; max-height: 80vh; padding-bottom: 28px; }
  .fab { bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px); right: 32px; }
}
</style>
</head>
<body>

<header>
  <h1>英単語 Anki</h1>
  <div class="header-stats">
    <span id="hdr-total"></span>
    <span id="hdr-due"></span>
  </div>
</header>

<!-- ===== PAGES ===== -->
<div class="pages">

  <!-- Study -->
  <div id="page-study" class="page active">
    <div class="page-inner">
      <div id="deck-bar-study" class="deck-bar" style="margin: -16px -16px 14px; padding: 8px 12px;"></div>
      <div class="study-modes">
        <button class="mode-btn active" data-mode="due">今日の復習</button>
        <button class="mode-btn" data-mode="all">全部</button>
        <button class="mode-btn" data-mode="weak">苦手(Lv1-2)</button>
        <button class="mode-btn" data-mode="random">ランダム20</button>
      </div>
      <div id="study-content"></div>
    </div>
  </div>

  <!-- List -->
  <div id="page-list" class="page">
    <div class="page-inner">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="単語・意味を検索…" autocomplete="off" autocapitalize="none">
      </div>
      <div class="filter-row" id="filter-row">
        <button class="filter-chip active" data-cat="all">すべて</button>
      </div>
      <div class="word-list" id="word-list"></div>
      <div class="empty-list" id="list-empty" style="display:none">まだ単語がありません。＋ボタンで追加しましょう！</div>
    </div>
  </div>

  <!-- Folders -->
  <div id="page-folders" class="page">
    <div class="page-inner">
      <div id="folder-list" class="folder-list"></div>
    </div>
  </div>

  <!-- Stats -->
  <div id="page-stats" class="page">
    <div class="page-inner">
      <div class="stats-grid">
        <div class="stat-card"><div class="num" id="st-total">0</div><div class="label">総単語数</div></div>
        <div class="stat-card"><div class="num" id="st-due">0</div><div class="label">今日の復習</div></div>
        <div class="stat-card"><div class="num" id="st-mastered">0</div><div class="label">習得済み(Lv5)</div></div>

<script>
// ===== CONSTANTS =====
const STORAGE_KEY = 'english_anki_v2';
const OLD_KEY = 'english_anki_v1';
const REVIEW_DAYS = [0, 1, 3, 7, 14, 30];
const DECK_COLORS = ['#4f46e5','#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4'];

// ===== DATA =====
let db = { words: [], decks: [], todayStudied: 0, todayDate: '' };

function loadDb() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      db = JSON.parse(raw);
    } else {
      // Migration from v1
      const old = localStorage.getItem(OLD_KEY);
      if (old) {
        const oldDb = JSON.parse(old);
        const defDeck = createDeckObj('メインデッキ', '#4f46e5');
        db.decks = [defDeck];
        db.words = (oldDb.words || []).map(w => ({ ...w, deckId: defDeck.id }));
        db.todayStudied = oldDb.todayStudied || 0;
        db.todayDate = oldDb.todayDate || '';
      } else {
        // Fresh start - default deck
        const defDeck = createDeckObj('メインデッキ', '#4f46e5');
        db.decks = [defDeck];
      }
    }
    // Ensure decks array exists
    if (!db.decks) db.decks = [];
    if (db.decks.length === 0) {
      db.decks.push(createDeckObj('メインデッキ', '#4f46e5'));
    }
    // Reset daily count if new day
    const today = new Date().toISOString().slice(0,10);
    if (db.todayDate !== today) {
      db.todayDate = today;
      db.todayStudied = 0;
    }
    saveDb();
  } catch(e) { console.error(e); }
}

function saveDb() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

function createDeckObj(name, color) {
  return { id: 'deck_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), name, color, createdAt: new Date().toISOString() };
}

function getDeck(id) { return db.decks.find(d => d.id === id); }
function deckColor(id) { const d = getDeck(id); return d ? d.color : '#94a3b8'; }
function deckName(id) { const d = getDeck(id); return d ? d.name : '未分類'; }

// ===== SRS =====
function isDue(word) {
  if (!word.lastReviewed) return true;
  const days = REVIEW_DAYS[word.level || 0];
  const next = new Date(word.lastReviewed);
  next.setDate(next.getDate() + days);
  return new Date() >= next;
}
function dueCount(words) { return (words || db.words).filter(w => isDue(w)).length; }

// ===== STATE =====
let currentPage = 'study';
let studyMode = 'due';
let studyDeckId = 'all'; // 'all' or deck id
let studyQueue = [];
let studyIdx = 0;
let flipped = false;
let sessionRatings = [0,0,0,0,0];
let editingWordId = null;
let editingDeckId = null;
let listCatFilter = 'all';
let listDeckFilter = 'all';

// ===== NAVIGATION =====
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPage = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+currentPage).classList.add('active');
    if (currentPage === 'study') { renderDeckBarStudy(); renderStudy(); }
    if (currentPage === 'list') renderList();
    if (currentPage === 'folders') renderFolders();
    if (currentPage === 'stats') renderStats();
    updateHeader();
  });
});

function goToPage(page) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  currentPage = page;
}

// ===== FAB =====
document.getElementById('fab-add').addEventListener('click', () => {
  if (currentPage === 'folders') openDeckAdd();
  else openWordAdd();
});

// ===== STUDY =====
function renderDeckBarStudy() {
  const bar = document.getElementById('deck-bar-study');
  const all = db.decks;
  bar.innerHTML = `<button class="deck-chip ${studyDeckId==='all'?'active':''}" data-did="all">すべて</button>` +
    all.map(d => `<button class="deck-chip ${studyDeckId===d.id?'active':''}" data-did="${d.id}" style="${studyDeckId===d.id?'border-color:'+d.color+';background:'+d.color:''}">${escHtml(d.name)}</button>`).join('');
  bar.querySelectorAll('.deck-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      studyDeckId = chip.dataset.did;
      renderDeckBarStudy();
      startStudy();
    });
  });
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    studyMode = btn.dataset.mode;
    startStudy();
  });
});

function getStudyPool() {
  let pool = [...db.words];
  if (studyDeckId !== 'all') pool = pool.filter(w => w.deckId === studyDeckId);
  return pool;
}

function getStudyQueue(mode) {
  let pool = getStudyPool();
  if (mode === 'due') pool = pool.filter(w => isDue(w));
  else if (mode === 'weak') pool = pool.filter(w => (w.level||0) <= 2);
  // shuffle
  for (let i = pool.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  if (mode === 'random') pool = pool.slice(0, Math.min(20, pool.length));
  return pool;
}

function startStudy() {
  studyQueue = getStudyQueue(studyMode);
  studyIdx = 0;
  flipped = false;
  sessionRatings = [0,0,0,0,0];
  renderStudy();
}

function renderStudy() {
  const el = document.getElementById('study-content');
  if (studyQueue.length === 0) {
    let msg = '';
    if (studyMode === 'due') msg = '今日の復習は全部終わりました！';
    else if (studyMode === 'weak') msg = '苦手な単語がありません。';
    else msg = '単語がありません。';
    const pool = getStudyPool();
    el.innerHTML = `<div class="no-cards-msg">
      <div class="big">🎉</div>
      <p>${msg}</p>
      ${pool.length === 0 ? '<p style="font-size:0.85rem">＋ボタンで単語を追加しましょう</p>' : ''}
    </div>`;
    return;
  }
  if (studyIdx >= studyQueue.length) { renderSummary(el); return; }

  const word = studyQueue[studyIdx];
  const total = studyQueue.length;
  const pct = Math.round((studyIdx / total) * 100);
  const deck = getDeck(word.deckId);
  const dc = deck ? deck.color : '#94a3b8';

  el.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="progress-label">${studyIdx + 1} / ${total}</div>
    <div class="card-scene" id="card-scene">
      <div class="flip-card" id="flip-card">
        <div class="card-face card-front">
          <div class="card-tag">英単語</div>
          <div class="card-word">${escHtml(word.word)}</div>
          ${word.phonetic ? `<div class="card-phonetic">${escHtml(word.phonetic)}</div>` : ''}
          ${word.category ? `<div class="card-category-badge">${escHtml(word.category)}</div>` : ''}
          ${deck ? `<div class="card-deck-badge" style="background:${dc}">${escHtml(deck.name)}</div>` : ''}
          <div class="card-hint">タップして答えを見る</div>
        </div>
        <div class="card-face card-back">
          <div class="card-tag">意味</div>
          <div class="card-meaning">${escHtml(word.meaning)}</div>
          ${word.example ? `<div class="card-example">${escHtml(word.example)}</div>` : ''}
          ${word.exampleJa ? `<div class="card-example-ja">${escHtml(word.exampleJa)}</div>` : ''}
          ${word.notes ? `<div class="card-notes">📝 ${escHtml(word.notes)}</div>` : ''}
        </div>
      </div>
    </div>
    <div class="flip-hint" id="flip-hint">タップしてめくる ↑</div>
    <div class="rating-section">
      <div class="rating-label">どのくらい分かった？</div>
      <div class="rating-btns">
        <button class="rate-btn r1" onclick="rate(1)" ${!flipped?'disabled':''}><span class="emoji">😰</span>Lv1</button>
        <button class="rate-btn r2" onclick="rate(2)" ${!flipped?'disabled':''}><span class="emoji">😕</span>Lv2</button>
        <button class="rate-btn r3" onclick="rate(3)" ${!flipped?'disabled':''}><span class="emoji">🙂</span>Lv3</button>
        <button class="rate-btn r4" onclick="rate(4)" ${!flipped?'disabled':''}><span class="emoji">😊</span>Lv4</button>
        <button class="rate-btn r5" onclick="rate(5)" ${!flipped?'disabled':''}><span class="emoji">🎯</span>Lv5</button>
      </div>
    </div>`;

  const scene = document.getElementById('card-scene');
  scene.addEventListener('click', flipCard);

  // Swipe gesture to flip
  let touchStartX = 0;
  scene.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  scene.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) flipCard();
  }, { passive: true });

  updateHeader();
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('flip-card').classList.add('flipped');
  document.getElementById('flip-hint').textContent = '↑ もう一度見る';
  document.querySelectorAll('.rate-btn').forEach(b => b.disabled = false);
}

function rate(level) {
  const word = studyQueue[studyIdx];
  const idx = db.words.findIndex(w => w.id === word.id);
  if (idx >= 0) {
    db.words[idx].level = level;
    db.words[idx].lastReviewed = new Date().toISOString();
    db.words[idx].reviewCount = (db.words[idx].reviewCount || 0) + 1;
  }
  sessionRatings[level-1]++;
  db.todayStudied++;
  saveDb();
  studyIdx++;
  flipped = false;
  renderStudy();
  updateHeader();
}

function renderSummary(el) {
  const total = studyQueue.length;
  const avgLevel = sessionRatings.reduce((s,c,i)=>s+c*(i+1),0) / total;
  el.innerHTML = `<div class="summary-card">
    <h2>セッション完了！</h2>
    <div class="big-num">${total}</div>
    <div style="color:var(--sub);font-size:0.85rem;margin-bottom:4px">単語を学習しました</div>
    <div style="color:var(--sub);font-size:0.85rem;margin-bottom:16px">平均レベル: ${avgLevel.toFixed(1)}</div>
    <div class="summary-dist">
      ${[1,2,3,4,5].map((l,i)=>`<div class="d${l}"><span class="d-num">${sessionRatings[i]}</span>Lv${l}</div>`).join('')}
    </div>
    <button class="btn-primary" onclick="startStudy()">もう一度</button>
  </div>`;
}

// ===== FOLDER PAGE =====
function renderFolders() {
  const el = document.getElementById('folder-list');
  const allDue = dueCount(db.words);
  const allWords = db.words.length;

  let html = `<div class="all-deck-card" onclick="goStudyDeck('all')">
    <div>
      <div class="deck-name">📚 すべて</div>
      <div class="deck-meta">${allWords}語</div>
    </div>
    ${allDue > 0 ? `<div class="deck-due-badge">復習 ${allDue}</div>` : '<div style="font-size:0.8rem;color:rgba(255,255,255,0.7)">復習なし</div>'}
  </div>`;

  if (db.decks.length === 0) {
    html += '<div class="empty-list">フォルダがありません。＋ボタンで作成しましょう。</div>';
  } else {
    html += db.decks.map(d => {
      const words = db.words.filter(w => w.deckId === d.id);
      const due = dueCount(words);
      return `<div class="deck-card" onclick="goStudyDeck('${d.id}')">
        <div class="deck-color-dot" style="background:${d.color}"></div>
        <div class="deck-info">
          <div class="deck-name">${escHtml(d.name)}</div>
          <div class="deck-meta">${words.length}語${due>0?` · 復習 ${due}語`:'　✓ 完了'}</div>
        </div>
        ${due > 0 ? `<div class="deck-due-badge">${due}</div>` : ''}
        <button class="deck-menu-btn" onclick="event.stopPropagation();openDeckMenu('${d.id}')">⋮</button>
      </div>`;
    }).join('');
  }
  el.innerHTML = html;
}

function goStudyDeck(deckId) {
  studyDeckId = deckId;
  goToPage('study');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === 'study'));
  renderDeckBarStudy();
  startStudy();
}

function openDeckMenu(deckId) {
  const deck = getDeck(deckId);
  if (!deck) return;
  const overlay = document.getElementById('modal-ctx-overlay');
  document.getElementById('ctx-menu-content').innerHTML = `
    <div style="font-weight:700;padding:4px 4px 12px;font-size:0.95rem">${escHtml(deck.name)}</div>
    <div class="ctx-menu">
      <button class="ctx-item" onclick="closeCtx();openDeckEdit('${deckId}')">✏️ 名前・カラーを変更</button>
      <div class="ctx-sep"></div>
      <button class="ctx-item danger" onclick="closeCtx();deleteDeck('${deckId}')">🗑️ フォルダを削除</button>
    </div>`;
  overlay.classList.add('open');
}

function closeCtx() { document.getElementById('modal-ctx-overlay').classList.remove('open'); }
document.getElementById('modal-ctx-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-ctx-overlay')) closeCtx(); });

function deleteDeck(deckId) {
  const deck = getDeck(deckId);
  if (!deck) return;
  const count = db.words.filter(w => w.deckId === deckId).length;
  const msg = count > 0
    ? `「${deck.name}」を削除します。\n所属する${count}語はすべてのデッキから削除されます。\nよろしいですか？`
    : `「${deck.name}」を削除しますか？`;
  if (!confirm(msg)) return;
  db.words = db.words.filter(w => w.deckId !== deckId);
  db.decks = db.decks.filter(d => d.id !== deckId);
  if (studyDeckId === deckId) studyDeckId = 'all';
  saveDb();
  renderFolders();
  updateHeader();
}

// ===== DECK MODAL =====
let selectedDeckColor = DECK_COLORS[0];

function openDeckAdd() {
  editingDeckId = null;
  document.getElementById('modal-deck-title').textContent = 'フォルダを作成';
  document.getElementById('f-deck-name').value = '';
  document.getElementById('btn-deck-delete').style.display = 'none';
  selectedDeckColor = DECK_COLORS[0];
  renderColorPicker();
  document.getElementById('modal-deck-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-deck-name').focus(), 300);
}

function openDeckEdit(deckId) {
  const deck = getDeck(deckId);
  if (!deck) return;
  editingDeckId = deckId;
  document.getElementById('modal-deck-title').textContent = 'フォルダを編集';
  document.getElementById('f-deck-name').value = deck.name;
  document.getElementById('btn-deck-delete').style.display = '';
  selectedDeckColor = deck.color;
  renderColorPicker();
  document.getElementById('modal-deck-overlay').classList.add('open');
}

function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = DECK_COLORS.map(c =>
    `<div class="color-swatch ${c===selectedDeckColor?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c) {
  selectedDeckColor = c;
  renderColorPicker();
}

document.getElementById('btn-deck-cancel').addEventListener('click', () => document.getElementById('modal-deck-overlay').classList.remove('open'));
document.getElementById('modal-deck-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-deck-overlay')) document.getElementById('modal-deck-overlay').classList.remove('open'); });

document.getElementById('btn-deck-save').addEventListener('click', () => {
  const name = document.getElementById('f-deck-name').value.trim();
  if (!name) { alert('フォルダ名を入力してください'); return; }
  if (editingDeckId) {
    const idx = db.decks.findIndex(d => d.id === editingDeckId);
    if (idx >= 0) { db.decks[idx].name = name; db.decks[idx].color = selectedDeckColor; }
  } else {
    db.decks.push(createDeckObj(name, selectedDeckColor));
  }
  saveDb();
  document.getElementById('modal-deck-overlay').classList.remove('open');
  renderFolders();
  updateDeckSelect();
});

document.getElementById('btn-deck-delete').addEventListener('click', () => {
  document.getElementById('modal-deck-overlay').classList.remove('open');
  if (editingDeckId) deleteDeck(editingDeckId);
});

// ===== LIST =====
function renderList() {
  // Deck filter chips + category filter chips
  const cats = ['all', ...new Set(db.words.map(w=>w.category).filter(Boolean))];
  const filterRow = document.getElementById('filter-row');
  const deckChips = `<button class="filter-chip ${listDeckFilter==='all'?'active':''}" data-did="all" style="border-left:3px solid var(--primary)">すべて</button>` +
    db.decks.map(d => `<button class="filter-chip ${listDeckFilter===d.id?'active':''}" data-did="${d.id}" style="${listDeckFilter===d.id?'background:'+d.color+';border-color:'+d.color:'border-left:3px solid '+d.color}">${escHtml(d.name)}</button>`).join('');
  const catChips = cats.filter(c=>c!=='all').map(c => `<button class="filter-chip cat-chip ${listCatFilter===c?'active':''}" data-cat="${escHtml(c)}">${escHtml(c)}</button>`).join('');
  const divider = cats.length > 1 ? `<span style="border-left:1px solid var(--border);height:24px;margin:0 2px;flex-shrink:0"></span>` : '';
  filterRow.innerHTML = deckChips + divider + catChips;

  filterRow.querySelectorAll('[data-did]').forEach(chip => {
    chip.addEventListener('click', () => { listDeckFilter = chip.dataset.did; renderList(); });
  });
  filterRow.querySelectorAll('.cat-chip').forEach(chip => {
    chip.addEventListener('click', () => { listCatFilter = chip.dataset.cat; renderList(); });
  });

  // Update datalist
  const dl = document.getElementById('cat-datalist');
  dl.innerHTML = cats.filter(c=>c!=='all').map(c=>`<option value="${escHtml(c)}">`).join('');

  const q = document.getElementById('search-input').value.toLowerCase();
  let words = db.words.filter(w => {
    const matchDeck = listDeckFilter === 'all' || w.deckId === listDeckFilter;
    const matchCat = listCatFilter === 'all' || w.category === listCatFilter;
    const matchQ = !q || w.word.toLowerCase().includes(q) || (w.meaning||'').includes(q);
    return matchDeck && matchCat && matchQ;
  });
  words = words.slice().sort((a,b) => a.word.localeCompare(b.word));

  const listEl = document.getElementById('word-list');
  const emptyEl = document.getElementById('list-empty');
  if (words.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = ''; return; }
  emptyEl.style.display = 'none';
  listEl.innerHTML = words.map(w => {
    const dc = deckColor(w.deckId);
    return `<div class="word-item" data-id="${w.id}" style="border-left:3px solid ${dc}">
      <div class="word-item-level lv${w.level||0}">${w.level||0}</div>
      <div class="word-item-body">
        <div class="word-item-en">${escHtml(w.word)}</div>
        <div class="word-item-ja">${escHtml(w.meaning)}</div>
        ${isDue(w) ? '<div class="word-item-meta">📅 復習タイミング</div>' : ''}
      </div>
      <div class="word-item-badges">
        ${w.category ? `<div class="word-item-cat">${escHtml(w.category)}</div>` : ''}
        <div class="word-item-deck" style="background:${dc}">${escHtml(deckName(w.deckId))}</div>
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.word-item').forEach(item => {
    item.addEventListener('click', () => openWordEdit(item.dataset.id));
  });
}

document.getElementById('search-input').addEventListener('input', renderList);

// ===== STATS =====
function renderStats() {
  const words = db.words;
  document.getElementById('st-total').textContent = words.length;
  document.getElementById('st-due').textContent = dueCount(words);
  document.getElementById('st-mastered').textContent = words.filter(w=>(w.level||0)===5).length;
  document.getElementById('st-studied').textContent = db.todayStudied || 0;

  const levels = [0,1,2,3,4,5];
  const levelCounts = levels.map(l => words.filter(w=>(w.level||0)===l).length);
  const maxCount = Math.max(...levelCounts, 1);
  const colors = ['#94a3b8','#ef4444','#f97316','#f59e0b','#22c55e','#3b82f6'];
  const labels = ['未学習','Lv1','Lv2','Lv3','Lv4','Lv5'];
  document.getElementById('level-bars').innerHTML = '<h3>レベル分布</h3>' +
    levels.map((l,i)=>`<div class="level-bar-row">
      <div class="lv-label" style="color:${colors[i]}">${labels[i]}</div>
      <div class="level-bar-track"><div class="level-bar-fill" style="width:${Math.round(levelCounts[i]/maxCount*100)}%;background:${colors[i]}"></div></div>
      <div class="lv-count">${levelCounts[i]}</div>
    </div>`).join('');

  // Folder stats
  document.getElementById('cat-stat-list').innerHTML = '<h3>フォルダ別</h3>' +
    (db.decks.length ? db.decks.map(d => {
      const dw = words.filter(w=>w.deckId===d.id);
      return `<div class="cat-row">
        <span class="cat-name" style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${d.color}"></span>${escHtml(d.name)}</span>
        <span class="cat-count">${dw.length}語 / 復習${dueCount(dw)}</span>
      </div>`;
    }).join('') : '<div style="color:var(--sub);font-size:0.85rem">フォルダがありません</div>');
}

// ===== WORD MODAL =====
function updateDeckSelect() {
  const sel = document.getElementById('f-deck');
  sel.innerHTML = db.decks.map(d => `<option value="${d.id}">${escHtml(d.name)}</option>`).join('');
}

function openWordAdd() {
  editingWordId = null;
  document.getElementById('modal-word-title').textContent = '単語を追加';
  ['f-word','f-phonetic','f-meaning','f-example','f-example-ja','f-category','f-notes'].forEach(id => document.getElementById(id).value = '');
  updateDeckSelect();
  // Pre-select current study deck
  if (studyDeckId !== 'all') document.getElementById('f-deck').value = studyDeckId;
  else if (db.decks.length > 0) document.getElementById('f-deck').value = db.decks[0].id;
  document.getElementById('btn-word-delete').style.display = 'none';
  document.getElementById('modal-word-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-word').focus(), 300);
}

function openWordEdit(id) {
  const word = db.words.find(w => w.id === id);
  if (!word) return;
  editingWordId = id;
  document.getElementById('modal-word-title').textContent = '単語を編集';
  document.getElementById('f-word').value = word.word || '';
  document.getElementById('f-phonetic').value = word.phonetic || '';
  document.getElementById('f-meaning').value = word.meaning || '';
  document.getElementById('f-example').value = word.example || '';
  document.getElementById('f-example-ja').value = word.exampleJa || '';
  document.getElementById('f-category').value = word.category || '';
  document.getElementById('f-notes').value = word.notes || '';
  updateDeckSelect();
  document.getElementById('f-deck').value = word.deckId || (db.decks[0]?.id || '');
  document.getElementById('btn-word-delete').style.display = '';
  document.getElementById('modal-word-overlay').classList.add('open');
}

document.getElementById('btn-word-cancel').addEventListener('click', () => document.getElementById('modal-word-overlay').classList.remove('open'));
document.getElementById('modal-word-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-word-overlay')) document.getElementById('modal-word-overlay').classList.remove('open'); });

document.getElementById('btn-word-save').addEventListener('click', () => {
  const word = document.getElementById('f-word').value.trim();
  const meaning = document.getElementById('f-meaning').value.trim();
  if (!word || !meaning) { alert('英単語と意味は必須です'); return; }
  const data = {
    word,
    phonetic: document.getElementById('f-phonetic').value.trim(),
    meaning,
    example: document.getElementById('f-example').value.trim(),
    exampleJa: document.getElementById('f-example-ja').value.trim(),
    category: document.getElementById('f-category').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    deckId: document.getElementById('f-deck').value || (db.decks[0]?.id || ''),
  };
  if (editingWordId) {
    const idx = db.words.findIndex(w => w.id === editingWordId);
    if (idx >= 0) Object.assign(db.words[idx], data);
  } else {
    db.words.push({ id: 'w_'+Date.now(), level: 0, lastReviewed: null, reviewCount: 0, createdAt: new Date().toISOString(), ...data });
  }
  saveDb();
  document.getElementById('modal-word-overlay').classList.remove('open');
  if (currentPage === 'list') renderList();
  if (currentPage === 'study') startStudy();
  if (currentPage === 'folders') renderFolders();
  updateHeader();
});

document.getElementById('btn-word-delete').addEventListener('click', () => {
  if (!confirm('この単語を削除しますか？')) return;
  db.words = db.words.filter(w => w.id !== editingWordId);
  saveDb();
  document.getElementById('modal-word-overlay').classList.remove('open');
  if (currentPage === 'list') renderList();
  if (currentPage === 'folders') renderFolders();
  updateHeader();
});

// ===== HEADER =====
function updateHeader() {
  document.getElementById('hdr-total').textContent = `${db.words.length}語`;
  document.getElementById('hdr-due').textContent = `復習: ${dueCount(db.words)}語`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
loadDb();
renderDeckBarStudy();
startStudy();
updateHeader();
</script>
</body>
